<!-- IMAGE SCRIPT -->
<script>

const photoInput =
document.getElementById("photo");

const previewImage =
document.getElementById("previewImage");

const base64HiddenInput =
document.getElementById(
"photoBase64String"
);


// IMAGE CONVERTER
photoInput.addEventListener(
"change",
function(){

    const file =
    this.files[0];

    if(file){

        // 1MB LIMIT
        if(file.size > 1024 * 1024){

            alert(
            "⚠️ Please choose image below 1MB."
            );

            this.value = "";

            previewImage.style.display =
            "none";

            base64HiddenInput.value =
            "";

            return;

        }

        const reader =
        new FileReader();

        reader.onload =
        function(e){

            const imageString =
            e.target.result;

            previewImage.src =
            imageString;

            previewImage.style.display =
            "block";

            base64HiddenInput.value =
            imageString;

        };

        reader.readAsDataURL(file);

    }

});

</script>

<!-- REGISTER SCRIPT -->
<script type="module"
src="js/register.js"></script>

</body>
</html>
