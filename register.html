<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register Member | SDA Church</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="navbar">
    <div class="logo">⛪ Naigobya SDA</div>
</div>

<div class="form-container">

    <h2>Church Member Registration</h2>

    <!-- INPUT FIELDS -->

    <div class="input-box">
        <input type="text" id="fullName" placeholder="Full Name" required>
    </div>

    <div class="input-box">
        <input type="date" id="dob" required>
    </div>

    <div class="input-box">
        <select id="gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
    </div>

    <div class="input-box">
        <input type="tel" id="phone" placeholder="Phone Number" required>
    </div>

    <div class="input-box">
        <input type="email" id="email" placeholder="Email Address" required>
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Create Password" required>
    </div>

    <div class="input-box">
        <input type="text" id="address" placeholder="Home Address">
    </div>

    <div class="input-box">
        <input type="text" id="village" placeholder="Village / District">
    </div>

    <div class="input-box">
        <input type="text" id="baptismStatus" placeholder="Baptism Status">
    </div>

    <div class="input-box">
        <input type="text" id="churchRole" placeholder="Church Role">
    </div>

    <div class="input-box">
        <input type="date" id="dateJoined">
    </div>

    <!-- PHOTO UPLOAD -->
    <div class="input-box">
        <input type="file" id="photo" accept="image/*">
    </div>

    <img id="previewImage"
         style="display:none; width:120px; margin-top:10px; border-radius:10px;">

    <input type="hidden" id="photoBase64String">

    <!-- REGISTER BUTTON -->
    <div class="input-box">
        <button onclick="registerUser()">
            Register Member
        </button>
    </div>

</div>

<!-- IMAGE PREVIEW SCRIPT -->
<script>

const photoInput = document.getElementById("photo");
const previewImage = document.getElementById("previewImage");
const base64HiddenInput = document.getElementById("photoBase64String");

photoInput.addEventListener("change", function () {

    const file = this.files[0];

    if (!file) return;

    if (file.size > 1024 * 1024) {

        alert("⚠️ Please choose image below 1MB.");

        this.value = "";
        previewImage.style.display = "none";
        base64HiddenInput.value = "";
        return;
    }

    const reader = new FileReader();

    reader.onload = function (e) {

        previewImage.src = e.target.result;
        previewImage.style.display = "block";

        base64HiddenInput.value = e.target.result;
    };

    reader.readAsDataURL(file);

});

</script>

<!-- REGISTER LOGIC -->
<script type="module" src="js/register.js"></script>

</body>
</html>
