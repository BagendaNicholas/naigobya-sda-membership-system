<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Member</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body style="background:#0f172a; color:white; font-family:Arial;">

<h2 style="text-align:center;">⛪ Church Member Registration</h2>

<div style="max-width:500px;margin:auto;padding:20px;">

  <input type="text" id="name" placeholder="Full Name" style="width:100%;padding:10px;margin:5px;"><br>

  <input type="text" id="phone" placeholder="Phone Number" style="width:100%;padding:10px;margin:5px;"><br>

  <input type="text" id="village" placeholder="Village / District" style="width:100%;padding:10px;margin:5px;"><br>

  <input type="email" id="email" placeholder="Email" style="width:100%;padding:10px;margin:5px;"><br>

  <input type="password" id="password" placeholder="Password" style="width:100%;padding:10px;margin:5px;"><br>

  <input type="file" id="photo"><br><br>

  <button onclick="registerUser()" style="width:100%;padding:12px;background:#22c55e;color:white;border:none;">
    Register
  </button>

</div>

<script type="module" src="js/register.js"></script>

</body>
</html>
