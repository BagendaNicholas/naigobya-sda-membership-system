<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Member | SDA Church</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">⛪ Naigobya SDA</div>
</div>

<div class="form-container">
    <h2>Church Member Registration</h2>

    <form id="registrationForm">
        
        <div class="input-box">
            <input type="text" id="fullName" placeholder="Full Name" required>
        </div>

        <div class="input-box">
            <input type="date" id="dob" required>
        </div>

        <div class="input-box">
            <select id="gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>

        <div class="input-box">
            <input type="tel" id="phone" placeholder="Phone Number" required>
        </div>

        <div class="input-box">
            <input type="email" id="email" placeholder="Email Address" required>
        </div>

        <div class="input-box">
            <input type="password" id="password" placeholder="Create Password" required>
        </div>

        <div class="input-box">
            <input type="text" id="address" placeholder="Home Address">
        </div>

        <div class="input-box">
            <input type="text" id="village" placeholder="Village / District" required>
        </div>

        <div class="input-box">
            <input type="text" id="baptismStatus" placeholder="Baptism Status">
        </div>

        <div class="input-box">
            <input type="text" id="churchRole" placeholder="Church Role">
        </div>

        <div class="input-box">
            <input type="date" id="dateJoined">
        </div>

        <div class="input-box">
            <input type="file" id="photo" accept="image/*">
        </div>

        <img id="previewImage" style="display:none; width:120px; margin-top:10px; border-radius:10px;">
        <input type="hidden" id="photoBase64String">

        <div id="loading" style="display: none; text-align: center; margin: 10px 0; color: #555;">
            ⏳ Registering, please wait...
        </div>

        <div class="input-box">
            <button type="submit">Register Member</button>
        </div>
    </form>
</div>

<script>
const photoInput = document.getElementById("photo");
const previewImage = document.getElementById("previewImage");
const base64HiddenInput = document.getElementById("photoBase64String");

photoInput.addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;

    // Fixed: 3MB in bytes calculation
    const maxThreeMB = 3 * 1024 * 1024; 

    if (file.size > maxThreeMB) {
        alert("⚠️ Please choose an image below 3MB.");
        this.value = "";
        previewImage.style.display = "none";
        base64HiddenInput.value = "";
        return;
    }

    const reader = new FileReader();
    reader.onload = function (e) {
        previewImage.src = e.target.result;
        previewImage.style.display = "block";
        base64HiddenInput.value = e.target.result;
    };
    reader.readAsDataURL(file);
});
</script>

<script type="module" src="js/register.js"></script>

</body>
</html>
