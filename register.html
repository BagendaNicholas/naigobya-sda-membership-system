<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Member | SDA Church</title>
<link rel="stylesheet" href="css/style.css">
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}
.navbar {
    background: #111827;
    padding: 15px 8%;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.logo {
    font-size: 20px;
    font-weight: bold;
    color: #22c55e;
}
.container {
    max-width: 500px;
    margin: 40px auto;
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
}
.container h2 {
    text-align: center;
    margin-bottom: 25px;
}
.section-title {
    color: #22c55e;
    font-size: 1.1rem;
    margin: 25px 0 15px 0;
    border-bottom: 1px solid #334155;
    padding-bottom: 5px;
}
.input-box {
    margin-bottom: 15px;
}
.input-box label {
    display: block;
    color: #94a3b8;
    font-size: 0.85rem;
    margin-bottom: 6px;
}
.input-box input {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #0f172a;
    color: white;
    outline: none;
    box-sizing: border-box;
}
.file-box {
    margin: 15px 0;
}
.file-box input {
    color: white;
}
.preview {
    text-align: center;
    margin-top: 15px;
    margin-bottom: 15px;
}
.preview img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #22c55e;
    display: none;
    margin: 0 auto;
}
button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}
button:hover {
    opacity: 0.9;
}
#loading {
    display: none;
    text-align: center;
    margin-top: 15px;
    color: #22c55e;
    font-weight: bold;
}
#compressionStatus {
    display: none;
    font-size: 0.85rem;
    color: #22c55e;
    font-weight: bold;
    margin-top: 5px;
}
@media(max-width:768px) {
    .container {
        margin: 20px;
        padding: 20px;
    }
}
</style>
</head>
<body>

<div class="navbar">
    <div class="logo">⛪ Naigobya SDA</div>
</div>

<div class="container">
    <h2>Church Member Registration</h2>

    <div class="input-box">
        <input type="text" id="name" placeholder="Full Name">
    </div>

    <div class="input-box">
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob">
    </div>

    <div class="input-box">
        <input type="text" id="phone" placeholder="Phone Number">
    </div>

    <div class="input-box">
        <input type="email" id="email" placeholder="Email Address">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
    </div>

    <div class="section-title">📍 Location Details</div>

    <div class="input-box">
        <input type="text" id="village" placeholder="Village">
    </div>

    <div class="input-box">
        <input type="text" id="county" placeholder="County">
    </div>

    <div class="input-box">
        <input type="text" id="district" placeholder="District">
    </div>

    <div class="input-box">
        <input type="text" id="country" value="Uganda" placeholder="Country">
    </div>

    <div class="section-title">⛪ Church Membership</div>

    <div class="input-box">
        <input type="text" id="church" placeholder="Local Church Name">
    </div>

    <div class="input-box">
        <input type="text" id="area" placeholder="Church Area / District Block">
    </div>

    <div class="input-box">
        <input type="text" id="pastor" placeholder="Pastor in Charge">
    </div>

    <div class="input-box">
        <label for="dobaptism">Date of Baptism</label>
        <input type="date" id="dobaptism">
    </div>

    <div class="file-box">
        <label style="color: #cbd5e1; font-size: 0.9rem;">Select Profile Photo</label><br><br>
        <input type="file" id="photo" accept="image/*">
        <div id="compressionStatus">⚡ Photo optimized automatically!</div>
        <input type="hidden" id="photoBase64String" value="">
    </div>

    <div class="preview">
        <img id="previewImage" alt="Profile Preview">
    </div>

    <button onclick="registerUser()">
        Register Member
    </button>

    <div id="loading">
        ⏳ Uploading Profile Photo & Registering...
    </div>
</div>

<script>
// Instant Background Canvas Compressor Engine
const photoInput = document.getElementById("photo");
const previewImage = document.getElementById("previewImage");
const base64HiddenInput = document.getElementById("photoBase64String");
const compressionStatus = document.getElementById("compressionStatus");

photoInput.addEventListener("change", function(){
    const file = this.files[0];
    if (file) {
        // Safe upper threshold check for file input handling
        if (file.size > 5 * 1024 * 1024) { 
            alert("⚠️ The chosen photo file size is too large. Please select an image under 5MB.");
            this.value = "";
            previewImage.style.display = "none";
            base64HiddenInput.value = "";
            compressionStatus.style.display = "none";
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e){
            const img = new Image();
            img.src = e.target.result;
            
            img.onload = function() {
                const canvas = document.createElement("canvas");
                let width = img.width;
                let height = img.height;
                
                // standard profile photo dimensions
                const MAX_WIDTH = 400;
                const MAX_HEIGHT = 400;
                
                if (width > height) {
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                } else {
                    if (height > MAX_HEIGHT) {
                        width *= MAX_HEIGHT / height;
                        height = MAX_HEIGHT;
                    }
                }
                
                canvas.width = width;
                canvas.height = height;
                
                // Render immediately onto background memory layout canvas context
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, width, height);
                
                // Convert instantly to space-saving compressed JPEG text string
                const compressedBase64 = canvas.toDataURL("image/jpeg", 0.7);
                
                // Silently cache values for register.js submission handling
                previewImage.src = compressedBase64;
                previewImage.style.display = "block";
                base64HiddenInput.value = compressedBase64;
                
                // Show status notification
                compressionStatus.style.display = "block";
            };
        };
        reader.readAsDataURL(file);
    }
});
</script>

<script type="module" src="js/register.js"></script>
</body>
</html>
