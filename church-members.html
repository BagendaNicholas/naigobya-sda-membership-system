<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
SDA Member Portal
</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">
        ⛪ Naigobya SDA
    </div>

    <div class="nav-links">

        <a href="index.html">
            Home
        </a>

        <a href="admin-dashboard.html"
        id="adminLink"
        style="display:none;">

            📊 Admin Panel

        </a>

        <button
        onclick="logoutUser()"
        style="
        background:none;
        border:none;
        color:white;
        width:auto;
        padding:0;
        margin-left:20px;">

            Logout

        </button>

    </div>

</div>

<!-- CONTAINER -->
<div class="form-container">

    <!-- PROFILE HEADER -->
    <div style="text-align:center;">

        <img
        id="displayAvatar"
        class="member-photo"
        src="https://via.placeholder.com/150"
        alt="Profile Photo">

        <h2 id="welcomeName">

            Loading Profile...

        </h2>

        <div
        id="accountStatus"
        class="status-pending"
        style="
        display:inline-block;
        padding:8px 15px;
        border-radius:20px;
        margin-top:10px;">

            Pending Approval

        </div>

    </div>

    <br>

    <!-- FULL NAME -->
    <div class="input-box">

        <label>
            Full Name
        </label>

        <input
        type="text"
        id="memberName">

    </div>

    <!-- DATE OF BIRTH -->
    <div class="input-box">

        <label>
            Date Of Birth
        </label>

        <input
        type="text"
        id="memberDOB">

    </div>

    <!-- COUNTRY -->
    <div class="input-box">

        <label>
            Country
        </label>

        <input
        type="text"
        id="memberCountry">

    </div>

    <!-- PHONE -->
    <div class="input-box">

        <label>
            Phone Number
        </label>

        <input
        type="text"
        id="memberPhone">

    </div>

    <!-- PASTOR -->
    <div class="input-box">

        <label>
            Pastor / Omusumba
        </label>

        <input
        type="text"
        id="memberPastor">

    </div>

    <!-- BAPTISM DATE -->
    <div class="input-box">

        <label>
            Baptism Date
        </label>

        <input
        type="text"
        id="memberBaptism">

    </div>

    <!-- DISTRICT -->
    <div class="input-box">

        <label>
            District
        </label>

        <input
        type="text"
        id="memberDistrict">

    </div>

    <!-- VILLAGE -->
    <div class="input-box">

        <label>
            Village
        </label>

        <input
        type="text"
        id="memberVillage">

    </div>

    <!-- EMAIL -->
    <div class="input-box">

        <label>
            Email Address
        </label>

        <input
        type="email"
        id="memberEmail"
        disabled>

    </div>

    <!-- PHOTO -->
    <div class="file-box">

        <label
        style="
        color:#cbd5e1;
        font-size:0.9rem;">

            Update Profile Photo

        </label>

        <br><br>

        <input
        type="file"
        id="updatePhoto"
        accept="image/*">

        <input
        type="hidden"
        id="updatePhotoBase64">

    </div>

    <!-- SAVE BUTTON -->
    <button
    id="saveProfileBtn">

        Save Profile Changes

    </button>

    <!-- LOADING -->
    <div id="loading">

        ⏳ Saving profile changes...

    </div>

</div>

<!-- IMAGE ENGINE -->
<script>

const updatePhoto =
document.getElementById(
"updatePhoto"
);

const displayAvatar =
document.getElementById(
"displayAvatar"
);

const hiddenPhoto =
document.getElementById(
"updatePhotoBase64"
);


// IMAGE TO BASE64
updatePhoto.addEventListener(
"change",
function(){

    const file =
    this.files[0];

    if(file){

        // 1MB LIMIT
        if(file.size > 1024 * 1024){

            alert(
            "⚠️ Please choose image below 1MB."
            );

            this.value = "";

            return;

        }

        const reader =
        new FileReader();

        reader.onload =
        function(e){

            const imageString =
            e.target.result;

            displayAvatar.src =
            imageString;

            hiddenPhoto.value =
            imageString;

        };

        reader.readAsDataURL(file);

    }

});

</script>

<!-- MEMBERS SCRIPT -->
<script type="module"
src="js/members.js"></script>

</body>
</html>
