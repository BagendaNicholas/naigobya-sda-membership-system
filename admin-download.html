<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Member Export Portal | Naigobya SDA</title>
<link rel="stylesheet" href="css/style.css">
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}
.navbar {
    background: #111827;
    padding: 15px 8%;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.logo-block {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: bold;
    color: #22c55e;
}
.logo-block img {
    height: 35px;
    width: auto;
}
.nav-links a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-size: 16px;
}
.nav-links a:hover { color: #22c55e; }

.panel-container {
    max-width: 1100px;
    margin: 40px auto;
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}
.panel-header {
    border-bottom: 2px solid #334155;
    padding-bottom: 15px;
    margin-bottom: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.panel-header h2 { margin: 0; color: white; }

.section-box {
    background: #0f172a;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 35px;
    border: 1px solid #1e293b;
}
.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}
.section-header h3 {
    margin: 0;
    font-size: 1.3rem;
    display: flex;
    align-items: center;
    gap: 10px;
}
.badge-count {
    font-size: 0.9rem;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: bold;
}
.count-approved { background: #15803d; color: #dcfce7; }
.count-pending { background: #b45309; color: #fef3c7; }

.btn-download {
    background: #22c55e;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    transition: 0.2s;
}
.btn-download:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-pending-dl { background: #f59e0b; color: #0f172a; }

.table-wrapper {
    overflow-x: auto;
}
table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    font-size: 0.9rem;
}
th {
    background: #111827;
    color: #94a3b8;
    padding: 12px;
    font-weight: 600;
    border-bottom: 2px solid #1e293b;
}
td {
    padding: 12px;
    border-bottom: 1px solid #1e293b;
    color: #cbd5e1;
}
tr:hover td { background: #1e293b; color: white; }

.loading-text {
    text-align: center;
    font-size: 1.2rem;
    color: #22c55e;
    padding: 40px;
    font-weight: bold;
}
</style>
</head>
<body>

  <nav class="navbar">
    <div class="logo-block">
      <img src="76531.jpg" alt="SDA Logo">
      <span>Naigobya SDA</span>
    </div>
    <div class="nav-links">
      <a href="admin-dashboard.html">📊 Dashboard</a>
      <a href="index.html">Home</a>
    </div>
  </nav>

  <div class="panel-container">
    <div class="panel-header">
      <h2>📋 Member Records Export Panel</h2>
      <div style="display: flex; gap: 10px;">
         <button class="btn-download" onclick="downloadBothLists()">📥 Download All Combined</button>
      </div>
    </div>

    <div id="masterLoading" class="loading-text">
        ⏳ Reading Church Ledger Records from Firestore...
    </div>

    <div id="portalContent" style="display: none;">
        
        <div class="section-box" style="border-top: 4px solid #22c55e;">
            <div class="section-header">
                <h3>🟢 Approved Members <span id="approvedCount" class="badge-count count-approved">0</span></h3>
                <button class="btn-download" onclick="exportList('approved')">💾 Download Approved List</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Full Name</th>
                            <th>Phone</th>
                            <th>Village</th>
                            <th>District</th>
                            <th>Local Church</th>
                            <th>Baptism Date</th>
                        </tr>
                    </thead>
                    <tbody id="approvedTableBody">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="section-box" style="border-top: 4px solid #f59e0b;">
            <div class="section-header">
                <h3>🟡 Pending Verification <span id="pendingCount" class="badge-count count-pending">0</span></h3>
                <button class="btn-download btn-pending-dl" onclick="exportList('pending')">💾 Download Pending List</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Full Name</th>
                            <th>Phone</th>
                            <th>Village</th>
                            <th>District</th>
                            <th>Local Church</th>
                            <th>Registration Date</th>
                        </tr>
                    </thead>
                    <tbody id="pendingTableBody">
                        </tbody>
                </table>
            </div>
        </div>

    </div>
  </div>

  <script type="module" src="js/admin-download.js"></script>
</body>
</html>
