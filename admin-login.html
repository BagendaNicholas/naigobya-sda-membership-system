<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#0f172a;color:white;font-family:Arial;text-align:center;">

<h2 id="logo">⛪ SDA Admin Login</h2>

<div style="max-width:400px;margin:auto;padding:20px;">

  <input id="email" placeholder="Admin Email" style="width:100%;padding:10px;margin:5px;"><br>
  <input id="password" type="password" placeholder="Password" style="width:100%;padding:10px;margin:5px;"><br>

  <button onclick="loginAdmin()" style="padding:12px;width:100%;background:#22c55e;color:white;border:none;">
    Login
  </button>

</div>

<!-- Hidden admin panel -->
<div id="adminPanel" style="display:none;margin-top:30px;">
  <h3>🔑 Admin Panel Unlocked</h3>
  <a href="admin-dashboard.html" style="color:#22c55e;">Go to Dashboard</a>
</div>

<script type="module" src="js/auth.js"></script>
</body>
</html>
