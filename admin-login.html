<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Naigobya SDA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="navbar web-ui-element">
        <div class="logo" style="display: flex; align-items: center; gap: 10px;">
            <img src="images/d79f36437e8fdd2dfd483598abf36544.jpg" alt="SDA Logo" style="height: 35px; width: auto; display: block; border-radius: 4px;">
            <span>Naigobya SDA</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
        </div>
    </div>

    <div class="container" style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
        <div class="form-container" style="width: 100%; max-width: 420px;">
            
            <div style="text-align: center; margin-bottom: 25px;">
                <h2 style="color: #22c55e; margin-bottom: 8px;">🔐 Admin Portal</h2>
                <p style="color: #cbd5e1; font-size: 14px;">Authorized Church Administration Access Only</p>
            </div>

            <div class="input-box">
                <label for="email">ADMINISTRATOR EMAIL</label>
                <input type="email" id="email" placeholder="e.g., nicholasbagenda@gmail.com" required>
            </div>

            <div class="input-box" style="margin-bottom: 20px;">
                <label for="password">SECURE ACCESS KEY</label>
                <input type="password" id="password" placeholder="••••••••••••" required>
            </div>

            <button onclick="loginAdmin()" class="green" style="font-weight: bold; letter-spacing: 0.5px; margin-top: 10px;">
                Secure Login
            </button>

            <div id="error" style="color: #ef4444; text-align: center; font-size: 14px; margin-top: 15px; font-weight: 600; min-height: 20px;"></div>

        </div>
    </div>

    <footer class="web-ui-element site-global-footer">
        <p>System Powered & Maintained By</p>
        <a href="https://bagendanicholas.github.io/My-website-/index.html" id="footerLogoLink" target="_blank">
            <img src="https://raw.githubusercontent.com/BagendaNicholas/naigobya-sda-membership-system/main/images/Mon_21_07_2025_16_26_06.png" class="developer-footer-logo" alt="Nicholas Bagenda Portfolio">
        </a>
    </footer>

    <script type="module" src="js/auth.js"></script>

</body>
</html>
