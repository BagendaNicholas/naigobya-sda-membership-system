<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | SDA Church</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* Custom style additions to align your new Edit action buttons beautifully */
.member-card {
    background: #1e293b;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 15px;
    text-align: center;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}
.member-card img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #22c55e;
    margin-bottom: 10px;
}
.btn-edit {
    background: #0284c7;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
    transition: 0.2s;
}
.btn-edit:hover {
    background: #0369a1;
}
.action-buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="navbar">
    <div class="logo">⛪ SDA Admin</div>
    <div class="nav-links">
        <a href="admin-dashboard.html">Home</a>
        <a href="#" onclick="logoutAdmin()">Logout</a>
    </div>
</div>

<div class="container">
    <h2>👨‍💼 Church Admin Dashboard</h2>

    <div id="stats" style="display:grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap:15px; margin-bottom:25px;">
        <div class="card">
            <h3 id="totalMembers">0</h3>
            <p>Total Members</p>
        </div>
        <div class="card">
            <h3 id="pendingMembers">0</h3>
            <p>Pending</p>
        </div>
        <div class="card">
            <h3 id="approvedMembers">0</h3>
            <p>Approved</p>
        </div>
    </div>

    <div class="input-box">
        <input type="text" id="searchInput" placeholder="Search member by name..." onkeyup="filterMembers()">
    </div>

    <div id="membersList"></div>
</div>

<script type="module" src="js/dashboard.js"></script>
</body>
</html>
